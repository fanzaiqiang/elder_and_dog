name: ROS2 CI

on:
  pull_request:
    branches:
      - 'main'
  push:
    branches:
      - 'main'

jobs:
  test_environment:
    runs-on: [ubuntu-latest]
    strategy:
      fail-fast: false
      matrix:
        ros_distribution:
          - humble
          - jazzy
        include:
          # Humble Hawksbill (May 2022 - May 2027)
          - docker_image: rostooling/setup-ros-docker:ubuntu-jammy-ros-humble-ros-base-latest
            ros_distribution: humble
            ros_version: 2
          - docker_image: rostooling/setup-ros-docker:ubuntu-noble-ros-jazzy-ros-base-latest
            ros_distribution: jazzy
            ros_version: 2
    container:
      image: ${{ matrix.docker_image }}
    steps:
      - name: checkout
        uses: actions/checkout@v2
        with:
          submodules: recursive
      - name: Install libunwind (fix issues on humble)
        run: |
          (sudo apt update && sudo apt install --no-install-recommends libunwind-dev -y) || \
          (apt update && apt install --no-install-recommends libunwind-dev -y) || true
      - name: build and test
        uses: ros-tooling/action-ros-ci@master
        with:
          target-ros2-distro: ${{ matrix.ros_distribution }}
          vcs-repo-file-url: ""
          skip-tests: false
      - name: Python syntax check
        run: |
          find . -name '*.py' -not -path './build/*' -not -path './install/*' -not -path './log/*' -not -path './.git/*' -not -path '*/node_modules/*' -print0 | xargs -0 -r python3 -m py_compile
          echo "All Python files pass syntax check."
